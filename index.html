<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback → PRD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">

    <header class="site-header">
      <div class="header-inner">
        <div class="header-title">
          <h1>Feedback → PRD</h1>
          <span class="badge">Prototype · Stage 1</span>
        </div>
        <div class="api-key-area">
          <div class="api-key-warning">
            &#9888; Prototype only — your API key is stored in browser localStorage. Do not share this URL or use a production key.
          </div>
          <div class="api-key-controls">
            <input
              type="password"
              id="api-key-input"
              placeholder="Paste your Claude API key (sk-ant-...)"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="save-key-btn" class="btn btn-secondary">Save Key</button>
            <button id="clear-key-btn" class="btn btn-ghost">Clear Key</button>
          </div>
          <span id="key-status" class="key-status"></span>
        </div>
      </div>
    </header>

    <main class="main-content">

      <section class="input-panel">
        <div class="section-label">
          <label for="feedback-input">Paste your feedback</label>
          <span class="hint">Separate items with a blank line (double Enter), or one item per line</span>
        </div>
        <textarea
          id="feedback-input"
          placeholder="The controls feel sluggish when jumping&#10;&#10;The tutorial is confusing — I didn't know what to do after level 2&#10;&#10;Music is great but it gets repetitive after 20 minutes&#10;&#10;Level 3 is too hard, died 15 times and gave up&#10;&#10;The graphics are beautiful, love the art style&#10;&#10;Why can't I save mid-level?"
          spellcheck="false"
        ></textarea>
        <div class="input-footer">
          <span id="item-count" class="item-count"></span>
          <button id="process-btn" class="btn btn-primary">Process Feedback</button>
        </div>
      </section>

      <section id="results" class="results-panel hidden"></section>

      <div id="export-row" class="export-row hidden">
        <button id="export-btn" class="btn btn-secondary">&#8595; Export all PRDs as Markdown</button>
      </div>

    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
